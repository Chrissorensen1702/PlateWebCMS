<!doctype html>
<html lang="da">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PlateWeb Lottie Preview</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #eef4ff 0%, #f9fbff 100%);
        font-family: Inter, system-ui, sans-serif;
      }
      .preview {
        width: min(960px, 92vw);
        border-radius: 32px;
        background: rgba(255,255,255,0.75);
        border: 1px solid rgba(184, 204, 240, 0.9);
        box-shadow: 0 24px 60px rgba(35, 55, 110, 0.12);
        padding: 24px;
      }
      #lottie {
        width: 100%;
        aspect-ratio: 12 / 7;
      }
      .caption {
        margin: 12px 8px 0;
        color: #4a5671;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="preview">
      <div id="lottie"></div>
      <p class="caption">PlateWeb builder + Platebook booking flow</p>
    </div>
    <script src="https://unpkg.com/lottie-web@5.12.2/build/player/lottie.min.js"></script>
    <script>
      lottie.loadAnimation({
        container: document.getElementById('lottie'),
        renderer: 'svg',
        loop: true,
        autoplay: true,
        path: './plateweb-builder-platebook.json'
      });
    </script>
  </body>
</html>
